
services:
  mysql:
    image: mysql:8.0
    container_name: bookshop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bookshop
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpass
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bookshop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookshop-backend
    restart: no
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: bookuser
      SPRING_DATASOURCE_PASSWORD: bookpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8089:8080"
    networks:
      - bookshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookshop-react-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bookshop-network
    stdin_open: true
    tty: true

volumes:
  mysql_data:

networks:
  bookshop-network:
    driver: bridge